<!-- Font Awesome -->

<style>
/* Body & Background */
body {
  font-family: 'Nunito', sans-serif;
  background: radial-gradient(circle at 30% 30%, #f0c6d5, #ffc0cb);
  overflow-x: hidden;
}

/* Hero Section */
#home {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  min-height: 90vh;

}

#home::before {

  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.2), rgba(255,182,193,0.1));
  z-index: 1;
  animation: pulseBG 15s infinite alternate;
}

@keyframes pulseBG {
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}

/* Particles canvas */
#hero-particles {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* Buttons hover futurist */
button, .whatsapp-btn {
  transition: all 0.3s ease-in-out;
}
button:hover, .whatsapp-btn:hover {
  transform: scale(1.05) translateY(-2px);
  box-shadow: 0 0 20px rgba(255,105,180,0.5);
}

/* Slides hover */
.slide:hover {
  transform: scale(1.03);
  box-shadow: 0 8px 30px rgba(255,105,180,0.4);
  transition: all 0.4s ease-in-out;
}

/* Typing cursor */
#hero-title::after {
  content: '|';
  animation: blink 1s infinite;
}
@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}
</style>
</head>

<!-- Particles JS -->
<script>
const canvas = document.getElementById('hero-particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 3 + 1,
    dx: (Math.random() - 0.5) * 0.5,
    dy: (Math.random() - 0.5) * 0.5
  });
}
function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,182,193,0.6)';
    ctx.fill();
    p.x += p.dx;
    p.y += p.dy;
    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

/* Typing effect */
const text = "Sublimez Votre Beauté";
let index = 0;
const titleEl = document.getElementById('hero-title');
function typeHero() {
  if(index < text.length){
    titleEl.innerHTML += text[index];
    index++;
    setTimeout(typeHero, 150);
  }
}
typeHero();
</script>
