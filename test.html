<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tessy's Beauty & More</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
/* Body & Background */
body {
  font-family: 'Nunito', sans-serif;
  background: radial-gradient(circle at 30% 30%, #f0c6d5, #ffc0cb);
  overflow-x: hidden;
}

/* Hero Section */
#home {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  min-height: 90vh;
  background: url('https://i.ibb.co/dsLzQ91s/Hero-Tessys-Face.png') center/cover no-repeat;
}

#home::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.2), rgba(255,182,193,0.1));
  z-index: 1;
  animation: pulseBG 15s infinite alternate;
}

@keyframes pulseBG {
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}

/* Particles canvas */
#hero-particles {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* Buttons hover futurist */
button, .whatsapp-btn {
  transition: all 0.3s ease-in-out;
}
button:hover, .whatsapp-btn:hover {
  transform: scale(1.05) translateY(-2px);
  box-shadow: 0 0 20px rgba(255,105,180,0.5);
}

/* Slides hover */
.slide:hover {
  transform: scale(1.03);
  box-shadow: 0 8px 30px rgba(255,105,180,0.4);
  transition: all 0.4s ease-in-out;
}

/* Typing cursor */
#hero-title::after {
  content: '|';
  animation: blink 1s infinite;
}
@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}
</style>
</head>

<body class="min-h-screen text-gray-800">

<!-- Header -->
<header id="man-header" class="fixed top-0 left-0 w-full bg-white/95 backdrop-blur-md shadow-sm z-50">
  <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-3">
      <img src="https://i.ibb.co/7HsTJyz/Tessys-Beauty-Logo.png" alt="Tessy's Beauty & More Logo" class="h-14 w-auto object-contain"/>
      <span class="text-pink-700 font-semibold text-xl md:text-2xl" style="font-family: 'Nunito', sans-serif;">Tessy’s Beauty & More</span>
    </a>
    <nav class="hidden md:flex font-medium justify-center md:justify-end">
      <ul class="flex space-x-6 flex-wrap">
        <li class="group relative">
          <a href="/academy.html" class="hover:text-pink-500 transition-all duration-300">Academy</a>
        </li>
        <li class="group relative">
          <a href="#services" class="hover:text-pink-500 transition-all duration-300">Services</a>
        </li>
        <li><a href="#contact" class="hover:text-pink-500 transition-all duration-300">Contact</a></li>
        <li><a href="#about" class="hover:text-pink-500 transition-all duration-300">À propos</a></li>
      </ul>
    </nav>
    <div class="md:hidden">
      <button id="hamburger" class="text-pink-600 text-2xl">&#9776;</button>
    </div>
  </div>
</header>

<!-- Hero -->
<main id="home" class="page-section relative">
  <canvas id="hero-particles"></canvas>
  <div class="relative z-10 bg-white/40 backdrop-blur-sm p-6 md:p-10 max-w-2xl shadow-lg">
    <h1 id="hero-title" class="text-5xl md:text-6xl text-pink-700 mb-4 drop-shadow-sm" style="font-family: 'Great Vibes', cursive;"></h1>
    <p class="text-gray-800 text-lg md:text-xl tracking-tight" style="font-family: 'Nunito', sans-serif;">
      Découvrez Tessy's Beauty AI : votre beauté, guidée par l’intelligence artificielle.
    </p>
    <button onclick="window.location.href='/academy.html'" class="px-6 py-3 bg-pink-600 text-white rounded-none shadow">Visiter Notre Academie</button>
  </div>
</main>

<!-- Services, Slides, About, Contact, Footer -->

<!-- Particles JS -->
<script>
const canvas = document.getElementById('hero-particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 3 + 1,
    dx: (Math.random() - 0.5) * 0.5,
    dy: (Math.random() - 0.5) * 0.5
  });
}
function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,182,193,0.6)';
    ctx.fill();
    p.x += p.dx;
    p.y += p.dy;
    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

/* Typing effect */
const text = "Sublimez Votre Beauté";
let index = 0;
const titleEl = document.getElementById('hero-title');
function typeHero() {
  if(index < text.length){
    titleEl.innerHTML += text[index];
    index++;
    setTimeout(typeHero, 150);
  }
}
typeHero();
</script>

</body>
</html>
